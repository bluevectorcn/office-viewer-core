name: Build and Release

on:
  workflow_dispatch:
    inputs:
      onlyoffice_version:
        description: 'OnlyOffice version (e.g. 9.4.0.131)'
        required: false
        default: ''
      compress:
        description: 'Compress assets (Brotli)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pnpm install

      - name: Build OnlyOffice
        run: |
          ARGS=""
          VERSION="${{ github.event.inputs.onlyoffice_version }}"
          if [ -n "$VERSION" ]; then
            ARGS="$ARGS $VERSION"
          fi
          if [ "${{ github.event.inputs.compress }}" != "true" ]; then
            ARGS="$ARGS --skip-compress"
          fi
          pnpm build:onlyoffice $ARGS
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"

      - name: Build Project
        run: pnpm build

      - name: Package dist
        run: tar -czf release-dist.tar.gz dist

      - name: Github Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          files: release-dist.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup redundant wasm
        run: rm -f dist/vendor/onlyoffice/x2t/x2t.wasm

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
