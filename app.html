<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Viewer Integration</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f5f1ea;
      }
      #editor {
        width: 100vw;
        height: 100vh;
      }
      #editor > .editor-host,
      #editor > iframe {
        height: 100vh !important;
        min-height: 100vh !important;
        border: none !important;
        border-radius: 0 !important;
      }
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #f5f1ea;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #loading-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .loader-container {
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(223, 108, 43, 0.12);
        border-top-color: #df6c2b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      .loading-title {
        font-size: 16px;
        font-weight: 600;
        color: #4a3e3d;
        margin-bottom: 8px;
      }
      .loading-status {
        font-size: 13px;
        color: #8c7e7b;
        max-width: 280px;
        margin: 0 auto;
        line-height: 1.5;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-title">正在载入文档</div>
        <div id="loading-status" class="loading-status">正在初始化转换任务...</div>
      </div>
    </div>
    <main id="editor"></main>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
